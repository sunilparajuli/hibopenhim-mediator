# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Replace YOUR_DOMAIN in nginx/production.conf
#   2. Replace YOUR_DOMAIN in nginx/console.production.json
#   3. Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm certbot
#   4. Then: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    # No need for self-signed cert generation in production
    entrypoint: ["nginx", "-g", "daemon off;"]

  # Let's Encrypt certbot
  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Replace YOUR_DOMAIN with your actual domain
    command: certonly --webroot -w /var/www/certbot -d YOUR_DOMAIN --agree-tos --no-eff-email --email your-email@example.com
    profiles:
      - certbot  # Only runs when explicitly called

  web:
    ports: []   # Don't expose Django directly in production
    environment:
      - DEBUG=False
      - NID_MOCK_ENABLED=False

  # Override console to point to /openhim-api/ path instead of port 8080
  openhim-console:
    volumes:
      - ./nginx/console.production.json:/usr/share/nginx/html/config/default.json:ro

volumes:
  letsencrypt:
  certbot_webroot:
