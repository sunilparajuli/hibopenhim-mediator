upstream openhim_channel {
    server openhim-core:5001;
}

upstream openhim_console {
    server openhim-console:80;
}

upstream openhim_api {
    server openhim-core:8080;
}

# Main API - proxies to OpenHIM channel (port 5001)
server {
    listen 80;
    server_name _;

    # API traffic -> OpenHIM -> Django
    location /api/ {
        proxy_pass         http://openhim_channel;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # OpenHIM Console UI
    location / {
        proxy_pass         http://openhim_console;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# OpenHIM Core API (HTTPS) - proxy on port 8443 so console can reach it
# This terminates SSL so users don't need to accept self-signed cert manually
server {
    listen 8443 ssl;
    server_name _;

    # Use OpenHIM's own self-signed certs (generated inside the container)
    # For production, replace with Let's Encrypt certs
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location / {
        proxy_pass         https://openhim_api;
        proxy_ssl_verify   off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
