upstream openhim_channel {
    server openhim-core:5001;
}

upstream openhim_console {
    server openhim-console:80;
}

upstream openhim_api {
    server openhim-core:8080;
}

# ============================================================
# PRODUCTION config for domain (e.g. abc.com)
# Replace YOUR_DOMAIN with your actual domain
# ============================================================

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # Let's Encrypt SSL certs
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # -----------------------------------------------------------
    # /api/* -> OpenHIM Channel (5001) -> Django (8000)
    # This is the main API endpoint
    # -----------------------------------------------------------
    location /api/ {
        proxy_pass         http://openhim_channel;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 90;
    }

    # -----------------------------------------------------------
    # /openhim-api/* -> OpenHIM Core API (8080/HTTPS)
    # The console JavaScript calls this to manage OpenHIM
    # No more self-signed cert issue — Let's Encrypt covers it
    # -----------------------------------------------------------
    location /openhim-api/ {
        # Strip /openhim-api/ prefix before forwarding
        rewrite ^/openhim-api/(.*) /$1 break;

        proxy_pass         https://openhim_api;
        proxy_ssl_verify   off;   # OpenHIM core uses self-signed internally
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # -----------------------------------------------------------
    # /* -> OpenHIM Console (web UI)
    # Must be last (catch-all)
    # -----------------------------------------------------------
    location / {
        proxy_pass         http://openhim_console;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
