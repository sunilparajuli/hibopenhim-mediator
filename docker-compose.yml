services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=nid_map_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: nid-map-service
    command: ["/bin/sh", "/app/entrypoint.sh"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/nid_map_db
      - SECRET_KEY=django-insecure-lb@s%br=g7l^h$&n0_g!h8-$$r_$w&of(_a_*+gz&s)q*ex=@_
      - DEBUG=True
      - DEV_MODE=True
      - NID_MOCK_ENABLED=True
      - OPENHIM_URL=https://openhim-core:8080
      - OPENHIM_API_USERNAME=root@openhim.org
      - OPENHIM_API_PASSWORD=password
      - VERIFY_SSL=False
    depends_on:
      db:
        condition: service_healthy
      openhim-core:
        condition: service_started

  # OpenHIM Stack
  mongodb:
    image: mongo:4.2
    volumes:
      - mongodb_data:/data/db
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.5"]
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  openhim-core:
    image: jembi/openhim-core:latest
    ports:
      - "5000:5000"
      - "5001:5001"
      - "8080:8080"
    environment:
      - mongo_url=mongodb://mongodb:27017/openhim?connectTimeoutMS=60000&serverSelectionTimeoutMS=60000
      - OPENHIM_PASSWORD=openhim-password
      - NODE_ENV=development
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always

  openhim-console:
    image: jembi/openhim-console:latest
    ports:
      - "9000:80"
    environment:
      - OPENHIM_CORE_HOST=localhost
      - OPENHIM_CORE_PORT=8080
    depends_on:
      - openhim-core
    restart: always

volumes:
  postgres_data:
  mongodb_data:
